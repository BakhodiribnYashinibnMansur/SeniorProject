<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>96. Unique BSTs — Animation</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:20px}
.header{text-align:center;margin-bottom:30px}.header h1{font-size:1.8rem;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.header p{color:#94a3b8}.container{max-width:900px;margin:0 auto;background:#1e293b;border-radius:12px;padding:24px;border:1px solid #334155}
.input-section{display:flex;gap:10px;margin-bottom:20px;justify-content:center}
select{padding:6px 10px;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:4px}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;background:#3b82f6;color:#fff}
.viz-area{background:#0f172a;border-radius:8px;padding:24px;display:flex;flex-direction:column;gap:16px;align-items:center;min-height:240px;font-family:'SF Mono',monospace}
.dp-row{display:flex;gap:8px;flex-wrap:wrap}
.dp-cell{padding:8px 14px;background:#1e293b;border-radius:6px;color:#fbbf24;font-weight:700}
</style></head>
<body><div class="header"><h1>96. Unique Binary Search Trees</h1><p>Medium — Catalan DP</p></div>
<div class="container">
<div class="input-section"><label style="color:#94a3b8;font-size:.85rem;align-self:center">n:</label>
<select id="nSel"><option value="3">3</option><option value="5">5</option><option value="8">8</option><option value="12">12</option></select>
<button class="btn" onclick="render()">Compute</button></div>
<div class="viz-area" id="viz"></div></div>
<script>
function render(){const n=parseInt(document.getElementById('nSel').value);const g=new Array(n+1).fill(0);g[0]=1;if(n>=1)g[1]=1;
for(let i=2;i<=n;i++)for(let j=0;j<i;j++)g[i]+=g[j]*g[i-1-j];
const viz=document.getElementById('viz');viz.innerHTML='';
const dp=document.createElement('div');dp.className='dp-row';
g.forEach((v,i)=>{const c=document.createElement('div');c.className='dp-cell';c.textContent=`g[${i}]=${v}`;dp.appendChild(c)});
viz.appendChild(dp);
const r=document.createElement('div');r.style.fontSize='1.5rem';r.style.color='#22c55e';r.style.fontWeight='800';r.textContent=`numTrees(${n}) = ${g[n]}`;viz.appendChild(r);}
render();
</script></body></html>
