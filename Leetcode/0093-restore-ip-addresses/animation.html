<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>93. Restore IP — Animation</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:20px}
.header{text-align:center;margin-bottom:30px}.header h1{font-size:1.8rem;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.header p{color:#94a3b8;font-size:.95rem}.container{max-width:900px;margin:0 auto;background:#1e293b;border-radius:12px;padding:24px;border:1px solid #334155}
.input-section{display:flex;gap:10px;margin-bottom:20px;align-items:center;justify-content:center}
.input-section input{padding:8px 12px;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:6px;font-family:'SF Mono',monospace}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;background:#3b82f6;color:#fff}
.viz-area{background:#0f172a;border-radius:8px;padding:24px;display:flex;flex-direction:column;gap:16px;align-items:center;min-height:240px}
.results{display:flex;flex-direction:column;gap:8px;font-family:'SF Mono',monospace}
.ip{padding:8px 16px;background:#22c55e;color:#fff;border-radius:6px;font-weight:700}
</style></head>
<body><div class="header"><h1>93. Restore IP Addresses</h1><p>Medium — Backtracking</p></div>
<div class="container">
<div class="input-section"><input type="text" id="sInput" value="25525511135"><button class="btn" onclick="render()">Find</button></div>
<div class="viz-area" id="viz"></div></div>
<script>
function findIPs(s){const result=[];function bt(start,parts){if(parts.length===4){if(start===s.length)result.push(parts.join('.'));return}
const rem=s.length-start,need=4-parts.length;if(rem<need||rem>need*3)return;
for(let l=1;l<=3&&start+l<=s.length;l++){const seg=s.slice(start,start+l);
if(seg.length>1&&seg[0]==='0')continue;if(parseInt(seg)>255)continue;
bt(start+l,parts.concat(seg))}}bt(0,[]);return result}
function render(){const s=document.getElementById('sInput').value;const ips=findIPs(s);const viz=document.getElementById('viz');
viz.innerHTML='';if(ips.length===0){viz.innerHTML='<div style="color:#ef4444">No valid IPs.</div>';return}
const r=document.createElement('div');r.className='results';
ips.forEach(ip=>{const d=document.createElement('div');d.className='ip';d.textContent=ip;r.appendChild(d)});viz.appendChild(r);}
render();
</script></body></html>
