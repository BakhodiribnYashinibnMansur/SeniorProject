<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>66. Plus One — Visual Animation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.8rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px; }
        .header p { color: #94a3b8; font-size: 0.95rem; }
        .container { max-width: 900px; margin: 0 auto; background: #1e293b;
            border-radius: 12px; padding: 24px; border: 1px solid #334155; }
        .controls { display: flex; gap: 10px; align-items: center; justify-content: center;
            margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
            font-size: 0.9rem; font-weight: 500; transition: all 0.2s; }
        .btn-play { background: #22c55e; color: white; }
        .btn-pause { background: #ef4444; color: white; }
        .btn-step { background: #3b82f6; color: white; }
        .btn-reset { background: #6b7280; color: white; }
        .speed-control { display: flex; align-items: center; gap: 8px; }
        .speed-control label { color: #94a3b8; font-size: 0.85rem; }
        .speed-control select { padding: 6px 10px; background: #0f172a; color: #e2e8f0;
            border: 1px solid #334155; border-radius: 4px; }
        .input-section { display: flex; gap: 10px; margin-bottom: 20px;
            align-items: center; justify-content: center; flex-wrap: wrap; }
        .input-section input { padding: 8px 12px; background: #0f172a; color: #e2e8f0;
            border: 1px solid #334155; border-radius: 6px; font-size: 0.9rem; min-width: 240px; }
        .viz-area { min-height: 220px; background: #0f172a; border-radius: 8px;
            padding: 20px; margin-bottom: 20px; display: flex; flex-direction: column;
            gap: 16px; align-items: center; }
        .digit-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
        .digit {
            width: 48px; height: 56px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #475569; color: white; font-weight: 700;
            border-radius: 8px; font-size: 1.4rem;
            transition: all 0.4s ease; position: relative;
        }
        .digit.processed { background: #6366f1; }
        .digit.cursor { box-shadow: 0 0 0 3px #fbbf24; transform: scale(1.1); }
        .digit.carried { background: #22c55e; }
        .digit.new { background: #ec4899; }
        .digit .small { font-size: 0.55rem; color: #cbd5e1; margin-top: 2px; }
        .carry-display {
            font-family: 'SF Mono', Consolas, monospace; font-size: 0.95rem;
            color: #fbbf24; font-weight: 600;
        }
        .info-panel { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
            margin-bottom: 20px; }
        .info-box { background: #0f172a; border-radius: 8px; padding: 14px;
            border: 1px solid #334155; text-align: center; }
        .info-box h3 { font-size: 0.75rem; color: #94a3b8; margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 1px; }
        .info-box .value { font-size: 1.05rem; font-weight: 600; }
        .step-description { background: #0f172a; border-left: 3px solid #3b82f6;
            padding: 12px 16px; border-radius: 0 8px 8px 0;
            margin-bottom: 20px; font-size: 0.92rem; line-height: 1.55; min-height: 50px; }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .info-panel { grid-template-columns: repeat(3, 1fr); }
            .container { padding: 14px; }
            .digit { width: 36px; height: 44px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>66. Plus One</h1>
    <p>Easy — Array, Math</p>
</div>

<div class="container">
    <div class="input-section">
        <input type="text" id="customInput" placeholder="9,9,9" value="1,9,9">
        <button class="btn btn-step" onclick="applyInput()">Apply</button>
    </div>

    <div class="controls">
        <button class="btn btn-play" onclick="play()">Play</button>
        <button class="btn btn-pause" onclick="pause()">Pause</button>
        <button class="btn btn-step" onclick="stepForward()">Step</button>
        <button class="btn btn-reset" onclick="reset()">Reset</button>
        <div class="speed-control">
            <label>Speed:</label>
            <select id="speed" onchange="updateSpeed()">
                <option value="1500">Slow</option>
                <option value="800" selected>Normal</option>
                <option value="350">Fast</option>
                <option value="120">Very Fast</option>
            </select>
        </div>
    </div>

    <div class="step-description" id="stepDesc">Press "Play" or "Step" to add 1.</div>

    <div class="viz-area" id="vizArea"></div>

    <div class="info-panel">
        <div class="info-box"><h3>Step</h3><div class="value" id="stepCounter">0 / 0</div></div>
        <div class="info-box"><h3>Index i</h3><div class="value" id="iVal">--</div></div>
        <div class="info-box"><h3>Carry</h3><div class="value" id="carryVal">1</div></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'plus-one_animation_state';
    function saveState() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ currentStep, speed, digits })); }
        catch(e) {}
    }
    function loadState() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch(e) { return null; }
    }

    const saved = loadState();
    let digits = saved ? saved.digits : [1, 9, 9];
    let currentStep = saved ? saved.currentStep : 0;
    let speed = saved ? saved.speed : 800;
    let isPlaying = false, playInterval = null;
    let steps = [];

    document.getElementById('customInput').value = digits.join(',');
    document.getElementById('speed').value = speed;

    function generateSteps() {
        steps = [];
        const arr = digits.slice();
        let carry = 1;
        steps.push({
            arr: arr.slice(), processed: new Set(), cursor: -1,
            carry, msg: `Initial: digits = [${arr.join(', ')}], carry = 1.`
        });
        const processed = new Set();
        for (let i = arr.length - 1; i >= 0; i--) {
            if (carry === 0) {
                steps.push({
                    arr: arr.slice(), processed: new Set(processed), cursor: -1,
                    carry: 0, msg: `Carry is 0 — stop early. Result: [${arr.join(', ')}].`
                });
                return;
            }
            const before = arr[i];
            const s = arr[i] + carry;
            arr[i] = s % 10;
            carry = Math.floor(s / 10);
            processed.add(i);
            steps.push({
                arr: arr.slice(), processed: new Set(processed), cursor: i,
                carry,
                msg: `i=${i}: ${before} + ${s - before} = ${s}. Write ${arr[i]}, carry = ${carry}.`
            });
        }
        if (carry > 0) {
            const final = [carry].concat(arr);
            steps.push({
                arr: final, processed: new Set(processed.values()), cursor: 0,
                carry: 0, prepended: true,
                msg: `Carry remains → prepend ${carry}. Result: [${final.join(', ')}].`
            });
        } else {
            steps.push({
                arr: arr.slice(), processed: new Set(processed.values()), cursor: -1,
                carry: 0, msg: `Done. Result: [${arr.join(', ')}].`
            });
        }
    }

    function renderStep() {
        if (steps.length === 0) return;
        saveState();
        const step = steps[Math.min(currentStep, steps.length - 1)];

        document.getElementById('stepCounter').textContent =
            `${Math.min(currentStep + 1, steps.length)} / ${steps.length}`;
        document.getElementById('iVal').textContent = step.cursor >= 0 ? step.cursor : '--';
        document.getElementById('carryVal').textContent = step.carry;
        document.getElementById('stepDesc').textContent = step.msg;

        const viz = document.getElementById('vizArea');
        viz.innerHTML = '';
        const row = document.createElement('div');
        row.className = 'digit-row';
        const len = step.arr.length;
        for (let k = 0; k < len; k++) {
            const cell = document.createElement('div');
            cell.className = 'digit';
            // adjust k for processed set when prepended
            let adjustedK = step.prepended ? k - 1 : k;
            if (step.prepended && k === 0) cell.classList.add('new');
            else if (step.processed && step.processed.has(adjustedK)) cell.classList.add('processed');
            if (step.cursor === k) cell.classList.add('cursor');
            cell.textContent = step.arr[k];
            const small = document.createElement('span');
            small.className = 'small';
            small.textContent = step.prepended ? (k === 0 ? 'new' : k - 1) : k;
            cell.appendChild(small);
            row.appendChild(cell);
        }
        viz.appendChild(row);

        const carryDisp = document.createElement('div');
        carryDisp.className = 'carry-display';
        carryDisp.textContent = `carry = ${step.carry}`;
        viz.appendChild(carryDisp);
    }

    function play() {
        if (isPlaying) return;
        isPlaying = true;
        playInterval = setInterval(() => {
            if (currentStep < steps.length - 1) { currentStep++; renderStep(); }
            else pause();
        }, speed);
    }
    function pause() { isPlaying = false; clearInterval(playInterval); }
    function stepForward() {
        pause();
        if (currentStep < steps.length - 1) { currentStep++; renderStep(); }
    }
    function reset() { pause(); currentStep = 0; renderStep(); }
    function updateSpeed() {
        speed = parseInt(document.getElementById('speed').value);
        if (isPlaying) { pause(); play(); }
        saveState();
    }
    function applyInput() {
        const raw = document.getElementById('customInput').value.trim();
        try {
            const arr = raw.replace(/[\[\]\s]/g, '').split(',').map(Number);
            if (arr.some(x => isNaN(x) || x < 0 || x > 9)) throw new Error('digit');
            if (arr.length === 0 || arr.length > 20) throw new Error('size');
            digits = arr;
            reset(); generateSteps(); renderStep(); saveState();
        } catch (e) {
            document.getElementById('stepDesc').textContent =
                'Invalid input. Provide 1..20 digits separated by commas.';
        }
    }

    generateSteps();
    if (currentStep >= steps.length) currentStep = 0;
    renderStep();
</script>

</body>
</html>
