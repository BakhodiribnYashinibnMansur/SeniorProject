<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Visualization — O(log n)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            color: #00d4ff;
            margin-bottom: 8px;
            font-size: 1.6em;
        }
        .subtitle {
            color: #888;
            margin-bottom: 20px;
            font-size: 0.95em;
        }
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        label { color: #aaa; font-size: 0.9em; }
        input[type="number"] {
            background: #16213e;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 6px 10px;
            border-radius: 4px;
            width: 80px;
            font-size: 0.95em;
        }
        input[type="number"]:focus { outline: none; border-color: #00d4ff; }
        button {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-start { background: #00d4ff; color: #1a1a2e; }
        .btn-start:hover { background: #00b8d9; }
        .btn-step { background: #e94560; color: #fff; }
        .btn-step:hover { background: #c73650; }
        .btn-reset { background: #555; color: #fff; }
        .btn-reset:hover { background: #666; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .info-panel {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .info-box {
            background: #16213e;
            padding: 10px 20px;
            border-radius: 6px;
            text-align: center;
            min-width: 120px;
        }
        .info-box .label { font-size: 0.8em; color: #888; }
        .info-box .value { font-size: 1.4em; font-weight: bold; color: #00d4ff; }

        .array-container {
            display: flex;
            gap: 4px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
        }
        .cell {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #16213e;
            border: 2px solid #333;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9em;
            transition: all 0.3s ease;
            position: relative;
        }
        .cell .index-label {
            position: absolute;
            top: -18px;
            font-size: 0.65em;
            color: #666;
        }
        .cell.active {
            background: #1a3a5c;
            border-color: #00d4ff;
        }
        .cell.mid {
            background: #e94560;
            border-color: #e94560;
            color: #fff;
            transform: scale(1.1);
        }
        .cell.found {
            background: #00c853;
            border-color: #00c853;
            color: #fff;
            transform: scale(1.15);
        }
        .cell.eliminated {
            background: #111;
            border-color: #222;
            color: #444;
            transform: scale(0.9);
        }
        .cell.left-ptr { border-bottom: 3px solid #ffab00; }
        .cell.right-ptr { border-bottom: 3px solid #aa00ff; }
        .cell.left-ptr.right-ptr { border-bottom: 3px solid #ff6d00; }

        .pointer-labels {
            display: flex;
            gap: 4px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
        }
        .ptr-cell {
            width: 52px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            font-weight: bold;
        }
        .ptr-left { color: #ffab00; }
        .ptr-right { color: #aa00ff; }
        .ptr-mid { color: #e94560; }

        .legend {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8em;
        }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }

        .log-panel {
            background: #16213e;
            border-radius: 6px;
            padding: 15px;
            max-width: 700px;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            line-height: 1.6;
        }
        .log-entry { border-bottom: 1px solid #222; padding: 3px 0; }
        .log-entry:last-child { border-bottom: none; }
        .log-step { color: #00d4ff; }
        .log-action { color: #e94560; }
        .log-found { color: #00c853; }
        .log-notfound { color: #ff6d00; }

        .size-selector {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        select {
            background: #16213e;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <h1>Binary Search Visualization</h1>
    <p class="subtitle">Watch the search space halve at each step — O(log n) in action</p>

    <div class="controls">
        <div class="size-selector">
            <label>Array size:</label>
            <select id="sizeSelect">
                <option value="8">8</option>
                <option value="15" selected>15</option>
                <option value="20">20</option>
            </select>
        </div>
        <div>
            <label>Target:</label>
            <input type="number" id="targetInput" value="42">
        </div>
        <button class="btn-start" id="btnStart" onclick="startSearch()">Start</button>
        <button class="btn-step" id="btnStep" onclick="stepSearch()" disabled>Step</button>
        <button class="btn-reset" onclick="resetSearch()">Reset</button>
    </div>

    <div class="info-panel">
        <div class="info-box">
            <div class="label">Step</div>
            <div class="value" id="stepCount">0</div>
        </div>
        <div class="info-box">
            <div class="label">Max Steps (log&#8322; n)</div>
            <div class="value" id="maxSteps">0</div>
        </div>
        <div class="info-box">
            <div class="label">Search Space</div>
            <div class="value" id="searchSpace">0</div>
        </div>
        <div class="info-box">
            <div class="label">Status</div>
            <div class="value" id="status" style="font-size:0.9em;">Ready</div>
        </div>
    </div>

    <div class="array-container" id="arrayContainer"></div>
    <div class="pointer-labels" id="pointerLabels"></div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-color" style="background:#1a3a5c;border:2px solid #00d4ff;"></div>
            <span>Active search space</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:#e94560;"></div>
            <span>Current mid</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:#00c853;"></div>
            <span>Found</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:#111;border:2px solid #222;"></div>
            <span>Eliminated</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="border-bottom:3px solid #ffab00;height:10px;"></div>
            <span>Left pointer</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="border-bottom:3px solid #aa00ff;height:10px;"></div>
            <span>Right pointer</span>
        </div>
    </div>

    <div class="log-panel" id="logPanel">
        <div class="log-entry" style="color:#666;">Click "Start" to begin binary search...</div>
    </div>

    <script>
        let arr = [];
        let left = 0, right = 0, mid = 0;
        let target = 0;
        let stepNum = 0;
        let searchActive = false;
        let searchDone = false;

        function generateSortedArray(size) {
            const result = [];
            let val = Math.floor(Math.random() * 5) + 1;
            for (let i = 0; i < size; i++) {
                result.push(val);
                val += Math.floor(Math.random() * 8) + 2;
            }
            return result;
        }

        function renderArray() {
            const container = document.getElementById('arrayContainer');
            const ptrContainer = document.getElementById('pointerLabels');
            container.innerHTML = '';
            ptrContainer.innerHTML = '';

            arr.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${i}`;

                const indexLabel = document.createElement('span');
                indexLabel.className = 'index-label';
                indexLabel.textContent = i;
                cell.appendChild(indexLabel);

                const valSpan = document.createElement('span');
                valSpan.textContent = val;
                cell.appendChild(valSpan);

                container.appendChild(cell);

                const ptrCell = document.createElement('div');
                ptrCell.className = 'ptr-cell';
                ptrCell.id = `ptr-${i}`;
                ptrContainer.appendChild(ptrCell);
            });
        }

        function updateDisplay() {
            arr.forEach((val, i) => {
                const cell = document.getElementById(`cell-${i}`);
                const ptr = document.getElementById(`ptr-${i}`);
                cell.className = 'cell';
                ptr.textContent = '';
                ptr.className = 'ptr-cell';

                if (searchDone && i === mid && arr[mid] === target) {
                    cell.classList.add('found');
                } else if (searchActive || searchDone) {
                    if (i >= left && i <= right && !searchDone) {
                        cell.classList.add('active');
                    } else if (i < left || i > right) {
                        cell.classList.add('eliminated');
                    }

                    if (i === mid && !searchDone) {
                        cell.classList.remove('active');
                        cell.classList.add('mid');
                    }
                }

                if (searchActive && !searchDone) {
                    if (i === left) {
                        cell.classList.add('left-ptr');
                        ptr.textContent = 'L';
                        ptr.classList.add('ptr-left');
                    }
                    if (i === right) {
                        cell.classList.add('right-ptr');
                        ptr.textContent = ptr.textContent ? 'L/R' : 'R';
                        ptr.classList.add('ptr-right');
                    }
                    if (i === mid) {
                        ptr.textContent = (ptr.textContent ? ptr.textContent + '/' : '') + 'M';
                        ptr.classList.add('ptr-mid');
                    }
                }
            });

            document.getElementById('stepCount').textContent = stepNum;
            document.getElementById('searchSpace').textContent =
                searchActive && !searchDone ? (right - left + 1) : (searchDone ? 0 : arr.length);
        }

        function addLog(message, type) {
            const panel = document.getElementById('logPanel');
            const entry = document.createElement('div');
            entry.className = 'log-entry';

            if (type === 'step') entry.innerHTML = `<span class="log-step">${message}</span>`;
            else if (type === 'action') entry.innerHTML = `<span class="log-action">${message}</span>`;
            else if (type === 'found') entry.innerHTML = `<span class="log-found">${message}</span>`;
            else if (type === 'notfound') entry.innerHTML = `<span class="log-notfound">${message}</span>`;
            else entry.textContent = message;

            panel.appendChild(entry);
            panel.scrollTop = panel.scrollHeight;
        }

        function startSearch() {
            const size = parseInt(document.getElementById('sizeSelect').value);
            target = parseInt(document.getElementById('targetInput').value);

            arr = generateSortedArray(size);

            // Optionally insert target so there's something to find ~60% of the time
            if (Math.random() < 0.6) {
                const insertIdx = Math.floor(Math.random() * size);
                arr[insertIdx] = target;
                arr.sort((a, b) => a - b);
            }

            left = 0;
            right = arr.length - 1;
            mid = -1;
            stepNum = 0;
            searchActive = true;
            searchDone = false;

            document.getElementById('maxSteps').textContent =
                Math.ceil(Math.log2(arr.length + 1));
            document.getElementById('status').textContent = 'Searching...';
            document.getElementById('status').style.color = '#00d4ff';

            document.getElementById('logPanel').innerHTML = '';
            addLog(`Array: [${arr.join(', ')}]`, 'step');
            addLog(`Searching for target: ${target}`, 'step');
            addLog(`Maximum steps: ceil(log2(${arr.length}+1)) = ${Math.ceil(Math.log2(arr.length + 1))}`, 'step');

            document.getElementById('btnStep').disabled = false;
            document.getElementById('btnStart').disabled = true;

            renderArray();
            updateDisplay();
        }

        function stepSearch() {
            if (!searchActive || searchDone) return;

            if (left > right) {
                searchDone = true;
                addLog(`Target ${target} NOT FOUND in the array.`, 'notfound');
                document.getElementById('status').textContent = 'Not Found';
                document.getElementById('status').style.color = '#ff6d00';
                document.getElementById('btnStep').disabled = true;
                updateDisplay();
                return;
            }

            stepNum++;
            mid = left + Math.floor((right - left) / 2);

            addLog(`Step ${stepNum}: left=${left}, right=${right}, mid=${mid}, arr[mid]=${arr[mid]}`, 'step');

            if (arr[mid] === target) {
                searchDone = true;
                addLog(`FOUND! Target ${target} is at index ${mid}.`, 'found');
                addLog(`Total steps: ${stepNum} (log2(${arr.length}) = ${Math.log2(arr.length).toFixed(1)})`, 'found');
                document.getElementById('status').textContent = `Found at [${mid}]`;
                document.getElementById('status').style.color = '#00c853';
                document.getElementById('btnStep').disabled = true;
            } else if (arr[mid] < target) {
                addLog(`arr[${mid}]=${arr[mid]} < ${target} --> go RIGHT (left = ${mid + 1})`, 'action');
                updateDisplay();
                setTimeout(() => {
                    left = mid + 1;
                    mid = -1;
                    updateDisplay();
                }, 300);
                return;
            } else {
                addLog(`arr[${mid}]=${arr[mid]} > ${target} --> go LEFT (right = ${mid - 1})`, 'action');
                updateDisplay();
                setTimeout(() => {
                    right = mid - 1;
                    mid = -1;
                    updateDisplay();
                }, 300);
                return;
            }

            updateDisplay();
        }

        function resetSearch() {
            searchActive = false;
            searchDone = false;
            stepNum = 0;
            arr = [];
            document.getElementById('stepCount').textContent = '0';
            document.getElementById('maxSteps').textContent = '0';
            document.getElementById('searchSpace').textContent = '0';
            document.getElementById('status').textContent = 'Ready';
            document.getElementById('status').style.color = '#e0e0e0';
            document.getElementById('arrayContainer').innerHTML = '';
            document.getElementById('pointerLabels').innerHTML = '';
            document.getElementById('logPanel').innerHTML =
                '<div class="log-entry" style="color:#666;">Click "Start" to begin binary search...</div>';
            document.getElementById('btnStep').disabled = true;
            document.getElementById('btnStart').disabled = false;
        }

        // Initialize
        document.getElementById('maxSteps').textContent = '0';
    </script>
</body>
</html>
