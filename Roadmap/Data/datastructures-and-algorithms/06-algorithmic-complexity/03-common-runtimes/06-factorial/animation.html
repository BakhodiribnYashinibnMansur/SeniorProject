<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factorial Time O(n!) — Permutation Tree Visualization</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0d1117;
        color: #c9d1d9;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }
    h1 {
        color: #58a6ff;
        margin-bottom: 5px;
        font-size: 1.6em;
    }
    .subtitle {
        color: #8b949e;
        margin-bottom: 20px;
        font-size: 0.95em;
    }
    .controls {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 15px;
        flex-wrap: wrap;
        justify-content: center;
    }
    .control-group {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    label {
        color: #8b949e;
        font-size: 0.9em;
    }
    input[type="range"] {
        width: 160px;
        accent-color: #58a6ff;
    }
    .n-value {
        color: #58a6ff;
        font-weight: bold;
        font-size: 1.2em;
        min-width: 20px;
    }
    .stats {
        display: flex;
        gap: 30px;
        margin-bottom: 15px;
        flex-wrap: wrap;
        justify-content: center;
    }
    .stat {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 10px 18px;
        text-align: center;
    }
    .stat-label {
        color: #8b949e;
        font-size: 0.8em;
        text-transform: uppercase;
    }
    .stat-value {
        color: #f0883e;
        font-size: 1.4em;
        font-weight: bold;
    }
    .stat-value.green { color: #3fb950; }
    .stat-value.blue { color: #58a6ff; }
    .stat-value.purple { color: #bc8cff; }
    button {
        background: #21262d;
        color: #c9d1d9;
        border: 1px solid #30363d;
        padding: 8px 18px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.9em;
        transition: background 0.2s;
    }
    button:hover { background: #30363d; }
    button.active { background: #1f6feb; border-color: #58a6ff; }
    #canvas-container {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 10px;
        overflow: auto;
        max-width: 95vw;
        max-height: 55vh;
        position: relative;
    }
    canvas { display: block; }
    .permutations-display {
        margin-top: 15px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 15px;
        max-width: 800px;
        width: 95vw;
        max-height: 150px;
        overflow-y: auto;
        font-family: 'Courier New', monospace;
        font-size: 0.85em;
    }
    .perm-item {
        display: inline-block;
        background: #21262d;
        border: 1px solid #30363d;
        border-radius: 4px;
        padding: 3px 8px;
        margin: 2px;
        transition: background 0.3s;
    }
    .perm-item.highlighted {
        background: #1f6feb;
        border-color: #58a6ff;
        color: #fff;
    }
    .legend {
        margin-top: 10px;
        display: flex;
        gap: 20px;
        font-size: 0.8em;
        color: #8b949e;
    }
    .legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .legend-color {
        width: 12px;
        height: 12px;
        border-radius: 50%;
    }
</style>
</head>
<body>
<h1>Factorial Time O(n!) -- Permutation Tree</h1>
<p class="subtitle">Visualizing how n! permutations are generated through a branching tree</p>

<div class="controls">
    <div class="control-group">
        <label for="nSlider">n =</label>
        <input type="range" id="nSlider" min="1" max="7" value="3">
        <span class="n-value" id="nDisplay">3</span>
    </div>
    <button id="stepBtn">Step</button>
    <button id="playBtn">Play</button>
    <button id="resetBtn">Reset</button>
    <div class="control-group">
        <label for="speedSlider">Speed:</label>
        <input type="range" id="speedSlider" min="1" max="10" value="5">
    </div>
</div>

<div class="stats">
    <div class="stat">
        <div class="stat-label">Total Leaves (n!)</div>
        <div class="stat-value" id="totalNodes">6</div>
    </div>
    <div class="stat">
        <div class="stat-label">Generated</div>
        <div class="stat-value green" id="generated">0</div>
    </div>
    <div class="stat">
        <div class="stat-label">Tree Nodes</div>
        <div class="stat-value blue" id="treeNodes">0</div>
    </div>
    <div class="stat">
        <div class="stat-label">Depth</div>
        <div class="stat-value purple" id="depthDisplay">0</div>
    </div>
</div>

<div id="canvas-container">
    <canvas id="treeCanvas"></canvas>
</div>

<div class="permutations-display" id="permDisplay"></div>

<div class="legend">
    <div class="legend-item">
        <div class="legend-color" style="background: #30363d;"></div>
        <span>Unexplored</span>
    </div>
    <div class="legend-item">
        <div class="legend-color" style="background: #1f6feb;"></div>
        <span>Active</span>
    </div>
    <div class="legend-item">
        <div class="legend-color" style="background: #3fb950;"></div>
        <span>Complete permutation</span>
    </div>
    <div class="legend-item">
        <div class="legend-color" style="background: #f0883e;"></div>
        <span>Backtracking</span>
    </div>
</div>

<script>
const canvas = document.getElementById('treeCanvas');
const ctx = canvas.getContext('2d');
const nSlider = document.getElementById('nSlider');
const nDisplay = document.getElementById('nDisplay');
const speedSlider = document.getElementById('speedSlider');
const stepBtn = document.getElementById('stepBtn');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const totalNodesEl = document.getElementById('totalNodes');
const generatedEl = document.getElementById('generated');
const treeNodesEl = document.getElementById('treeNodes');
const depthDisplayEl = document.getElementById('depthDisplay');
const permDisplay = document.getElementById('permDisplay');

let n = 3;
let treeData = null;
let animationState = null;
let playing = false;
let animTimer = null;

function factorial(x) {
    let r = 1;
    for (let i = 2; i <= x; i++) r *= i;
    return r;
}

function buildTree(n) {
    let nodeId = 0;
    function build(available, chosen, depth) {
        const node = {
            id: nodeId++,
            chosen: [...chosen],
            available: [...available],
            depth: depth,
            children: [],
            state: 'hidden',
            x: 0, y: 0
        };
        if (available.length === 0) {
            node.isLeaf = true;
            return node;
        }
        node.isLeaf = false;
        for (let i = 0; i < available.length; i++) {
            const newAvail = available.filter((_, idx) => idx !== i);
            const newChosen = [...chosen, available[i]];
            node.children.push(build(newAvail, newChosen, depth + 1));
        }
        return node;
    }
    const elements = [];
    for (let i = 1; i <= n; i++) elements.push(i);
    return build(elements, [], 0);
}

function layoutTree(root, n) {
    const leafCount = factorial(n);
    const nodeSpacing = Math.max(28, 60 - n * 5);
    const levelHeight = Math.max(50, 70 - n * 3);
    const totalWidth = leafCount * nodeSpacing;
    const totalHeight = (n + 1) * levelHeight + 60;

    canvas.width = Math.max(totalWidth + 80, 400);
    canvas.height = totalHeight;

    let leafIndex = 0;
    function assignPositions(node) {
        if (node.isLeaf) {
            node.x = 40 + leafIndex * nodeSpacing + nodeSpacing / 2;
            node.y = 30 + node.depth * levelHeight;
            leafIndex++;
            return;
        }
        for (const child of node.children) {
            assignPositions(child);
        }
        const firstChild = node.children[0];
        const lastChild = node.children[node.children.length - 1];
        node.x = (firstChild.x + lastChild.x) / 2;
        node.y = 30 + node.depth * levelHeight;
    }
    assignPositions(root);
}

function getSteps(root) {
    const steps = [];
    function dfs(node) {
        steps.push({ type: 'visit', node: node });
        if (node.isLeaf) {
            steps.push({ type: 'complete', node: node });
            return;
        }
        for (const child of node.children) {
            dfs(child);
            steps.push({ type: 'backtrack', node: node });
        }
    }
    dfs(root);
    return steps;
}

function initAnimation() {
    treeData = buildTree(n);
    layoutTree(treeData, n);
    const steps = getSteps(treeData);
    animationState = {
        steps: steps,
        currentStep: 0,
        generatedCount: 0,
        visitedCount: 0,
        maxDepth: 0,
        permutations: []
    };
    // Reset all node states
    function resetStates(node) {
        node.state = 'hidden';
        for (const child of node.children) resetStates(child);
    }
    resetStates(treeData);
    totalNodesEl.textContent = factorial(n).toLocaleString();
    generatedEl.textContent = '0';
    treeNodesEl.textContent = '0';
    depthDisplayEl.textContent = '0';
    permDisplay.innerHTML = '';
    drawTree();
}

function doStep() {
    if (!animationState || animationState.currentStep >= animationState.steps.length) {
        stopPlaying();
        return false;
    }
    const step = animationState.steps[animationState.currentStep];
    const node = step.node;

    // Clear previous active/backtrack highlights
    function clearActive(n) {
        if (n.state === 'active' || n.state === 'backtrack') n.state = 'visited';
        for (const c of n.children) clearActive(c);
    }
    clearActive(treeData);

    if (step.type === 'visit') {
        node.state = 'active';
        animationState.visitedCount++;
        animationState.maxDepth = Math.max(animationState.maxDepth, node.depth);
    } else if (step.type === 'complete') {
        node.state = 'complete';
        animationState.generatedCount++;
        const perm = node.chosen.join(',');
        animationState.permutations.push(perm);
        addPermToDisplay(perm);
    } else if (step.type === 'backtrack') {
        node.state = 'backtrack';
    }

    generatedEl.textContent = animationState.generatedCount.toLocaleString();
    treeNodesEl.textContent = animationState.visitedCount.toLocaleString();
    depthDisplayEl.textContent = animationState.maxDepth;

    animationState.currentStep++;
    drawTree();
    return true;
}

function addPermToDisplay(perm) {
    const span = document.createElement('span');
    span.className = 'perm-item highlighted';
    span.textContent = '[' + perm + ']';
    permDisplay.appendChild(span);
    setTimeout(() => span.classList.remove('highlighted'), 600);
    permDisplay.scrollTop = permDisplay.scrollHeight;
}

function drawTree() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    function drawEdges(node) {
        for (const child of node.children) {
            if (child.state === 'hidden') continue;
            ctx.beginPath();
            ctx.moveTo(node.x, node.y);
            ctx.lineTo(child.x, child.y);
            if (child.state === 'active') {
                ctx.strokeStyle = '#1f6feb';
                ctx.lineWidth = 2;
            } else if (child.state === 'complete') {
                ctx.strokeStyle = '#3fb950';
                ctx.lineWidth = 2;
            } else if (child.state === 'backtrack') {
                ctx.strokeStyle = '#f0883e';
                ctx.lineWidth = 2;
            } else {
                ctx.strokeStyle = '#30363d';
                ctx.lineWidth = 1;
            }
            ctx.stroke();
            drawEdges(child);
        }
    }

    function drawNodes(node) {
        if (node.state === 'hidden') return;
        const radius = Math.max(8, 16 - n);

        ctx.beginPath();
        ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
        switch (node.state) {
            case 'active':
                ctx.fillStyle = '#1f6feb';
                break;
            case 'complete':
                ctx.fillStyle = '#3fb950';
                break;
            case 'backtrack':
                ctx.fillStyle = '#f0883e';
                break;
            case 'visited':
                ctx.fillStyle = '#484f58';
                break;
            default:
                ctx.fillStyle = '#30363d';
        }
        ctx.fill();
        ctx.strokeStyle = '#c9d1d9';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Label
        if (n <= 5) {
            ctx.fillStyle = '#c9d1d9';
            ctx.font = `${Math.max(8, 12 - n)}px monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const label = node.chosen.length > 0 ? node.chosen[node.chosen.length - 1] : '*';
            ctx.fillText(String(label), node.x, node.y);
        }

        for (const child of node.children) drawNodes(child);
    }

    drawEdges(treeData);
    drawNodes(treeData);
}

function startPlaying() {
    playing = true;
    playBtn.textContent = 'Pause';
    playBtn.classList.add('active');
    const speed = parseInt(speedSlider.value);
    const delay = Math.max(10, 500 - speed * 45);
    function tick() {
        if (!playing) return;
        const hasMore = doStep();
        if (hasMore) {
            animTimer = setTimeout(tick, delay);
        } else {
            stopPlaying();
        }
    }
    tick();
}

function stopPlaying() {
    playing = false;
    playBtn.textContent = 'Play';
    playBtn.classList.remove('active');
    if (animTimer) {
        clearTimeout(animTimer);
        animTimer = null;
    }
}

function completeInstantly() {
    if (!animationState) return;
    while (animationState.currentStep < animationState.steps.length) {
        const step = animationState.steps[animationState.currentStep];
        const node = step.node;
        if (step.type === 'visit') {
            node.state = 'visited';
            animationState.visitedCount++;
            animationState.maxDepth = Math.max(animationState.maxDepth, node.depth);
        } else if (step.type === 'complete') {
            node.state = 'complete';
            animationState.generatedCount++;
            animationState.permutations.push(node.chosen.join(','));
        } else if (step.type === 'backtrack') {
            node.state = 'visited';
        }
        animationState.currentStep++;
    }
    generatedEl.textContent = animationState.generatedCount.toLocaleString();
    treeNodesEl.textContent = animationState.visitedCount.toLocaleString();
    depthDisplayEl.textContent = animationState.maxDepth;
    permDisplay.innerHTML = '';
    for (const p of animationState.permutations) {
        const span = document.createElement('span');
        span.className = 'perm-item';
        span.textContent = '[' + p + ']';
        permDisplay.appendChild(span);
    }
    drawTree();
}

nSlider.addEventListener('input', () => {
    n = parseInt(nSlider.value);
    nDisplay.textContent = n;
    stopPlaying();
    if (n > 6) {
        // For n=7, show completed state immediately (5040 nodes is too many to animate)
        initAnimation();
        completeInstantly();
    } else {
        initAnimation();
    }
});

stepBtn.addEventListener('click', () => {
    stopPlaying();
    doStep();
});

playBtn.addEventListener('click', () => {
    if (playing) {
        stopPlaying();
    } else {
        if (animationState && animationState.currentStep >= animationState.steps.length) {
            initAnimation();
        }
        startPlaying();
    }
});

resetBtn.addEventListener('click', () => {
    stopPlaying();
    initAnimation();
});

speedSlider.addEventListener('input', () => {
    if (playing) {
        stopPlaying();
        startPlaying();
    }
});

// Initial render
initAnimation();
</script>
</body>
</html>
