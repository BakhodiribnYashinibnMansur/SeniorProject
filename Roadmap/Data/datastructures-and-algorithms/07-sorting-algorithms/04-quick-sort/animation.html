<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><title>Quick Sort — Visual Animation</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;
--green:#3fb950;--yellow:#d29922;--red:#f85149;--blue:#58a6ff;--purple:#bc8cff;--orange:#ffa657}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);
min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:2rem;color:var(--blue);margin-bottom:6px;text-align:center}
.subtitle{color:var(--muted);margin-bottom:18px;text-align:center}
.badges{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;justify-content:center}
.badge{padding:4px 10px;border-radius:12px;font-size:.8rem;font-weight:600;
border:1px solid var(--border);background:var(--surface)}
.badge.best{color:var(--green);border-color:var(--green)}
.badge.worst{color:var(--red);border-color:var(--red)}
.badge.space{color:var(--blue);border-color:var(--blue)}
.controls,.input-control{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
button{padding:8px 18px;border:2px solid var(--blue);background:transparent;
color:var(--blue);border-radius:6px;cursor:pointer;font-size:.95rem}
button:hover:not(:disabled){background:var(--blue);color:var(--bg)}
button:disabled{opacity:.4;cursor:not-allowed}
button.secondary{border-color:var(--border);color:var(--muted)}
input[type=text]{padding:8px 14px;border:2px solid var(--border);background:var(--surface);
color:var(--text);border-radius:6px;font-size:.95rem;width:300px}
input[type=range]{width:160px;accent-color:var(--blue)}
.canvas-container{background:var(--surface);border:2px solid var(--border);border-radius:12px;
padding:24px;margin-bottom:16px;width:100%;max-width:1000px;min-height:200px;
display:flex;justify-content:center;align-items:flex-end;gap:6px;flex-wrap:nowrap;overflow-x:auto}
.cell{min-width:42px;height:50px;display:flex;flex-direction:column;align-items:center;
justify-content:center;background:var(--bg);border:2px solid var(--border);border-radius:6px;
font-family:monospace;color:var(--text);transition:all .25s;position:relative}
.cell.pivot{background:var(--purple);color:var(--bg);border-color:var(--purple);transform:translateY(-8px)}
.cell.less{background:var(--green);color:var(--bg);border-color:var(--green)}
.cell.greater{background:var(--orange);color:var(--bg);border-color:var(--orange)}
.cell.compare{background:var(--red);color:var(--bg);border-color:var(--red)}
.cell.swap{background:var(--yellow);color:var(--bg);border-color:var(--yellow)}
.cell.sorted{background:var(--green);color:var(--bg);border-color:var(--green);opacity:.6}
.cell .idx{font-size:.7rem;color:var(--muted);position:absolute;bottom:-18px}
.info-panel{background:var(--surface);border:2px solid var(--border);border-radius:12px;
padding:16px 20px;width:100%;max-width:1000px;margin-bottom:16px}
.info-panel h3{color:var(--blue);margin-bottom:8px;font-size:1rem}
.step-info{font-family:monospace;font-size:.92rem;line-height:1.6}
.step-info .highlight{color:var(--yellow);font-weight:600}
.stats{background:var(--surface);border:2px solid var(--border);border-radius:12px;
padding:12px 20px;display:flex;gap:30px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.stat-label{color:var(--muted);font-size:.75rem;text-transform:uppercase}
.stat-value{color:var(--blue);font-size:1.2rem;font-weight:700;font-family:monospace}
.legend{display:flex;gap:18px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.82rem;color:var(--muted)}
.legend-color{width:14px;height:14px;border-radius:3px}
</style></head><body>
<h1>Quick Sort</h1>
<p class="subtitle">Pick pivot, partition into ≤/≥ regions, recurse on both sides.</p>
<div class="badges">
<span class="badge best">Best: O(n log n)</span>
<span class="badge worst">Worst: O(n²)</span>
<span class="badge space">Space: O(log n)</span>
<span class="badge worst">Not Stable</span>
</div>
<div class="input-control">
<input type="text" id="customInput" placeholder="Enter numbers: 7,2,1,6,8,5,3,4">
<button onclick="loadInput()">Load</button>
<button onclick="genRandom()" class="secondary">Random</button>
</div>
<div class="controls">
<button id="startBtn" onclick="start()">▶ Start</button>
<button id="stepBtn" onclick="stepFwd()">▷ Step</button>
<button id="pauseBtn" onclick="pause()" disabled>❚❚ Pause</button>
<button id="resetBtn" onclick="reset()" class="secondary">↺ Reset</button>
</div>
<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
<span style="color:var(--muted);font-size:.8rem">slow</span>
<input type="range" id="speedSlider" min="1" max="10" value="6">
<span style="color:var(--muted);font-size:.8rem">fast</span>
</div>
<div class="legend">
<div class="legend-item"><div class="legend-color" style="background:var(--purple)"></div>Pivot</div>
<div class="legend-item"><div class="legend-color" style="background:var(--red)"></div>Comparing</div>
<div class="legend-item"><div class="legend-color" style="background:var(--yellow)"></div>Swapping</div>
<div class="legend-item"><div class="legend-color" style="background:var(--green)"></div>≤ pivot / Final</div>
<div class="legend-item"><div class="legend-color" style="background:var(--orange)"></div>&gt; pivot</div>
</div>
<div class="stats">
<div><div class="stat-label">Step</div><div class="stat-value"><span id="curStep">0</span>/<span id="totSteps">0</span></div></div>
<div><div class="stat-label">Depth</div><div class="stat-value" id="depth">0</div></div>
<div><div class="stat-label">Comparisons</div><div class="stat-value" id="comps">0</div></div>
<div><div class="stat-label">Swaps</div><div class="stat-value" id="swaps">0</div></div>
</div>
<div class="canvas-container" id="canvas"></div>
<div class="info-panel">
<h3>Algorithm Trace</h3>
<div class="step-info" id="info">Press <span class="highlight">Start</span> to run.</div>
</div>
<script>
let array=[7,2,1,6,8,5,3,4],steps=[],idx=0,running=false,timer=null;

function genSteps(arr){
  const out=[]; const a=[...arr]; let comps=0,swaps=0,maxDepth=0;
  const finalSorted=new Set();
  function sort(lo,hi,depth){
    if(lo>=hi){
      if(lo===hi) finalSorted.add(lo);
      return;
    }
    if(depth>maxDepth) maxDepth=depth;
    const pivot=a[hi];
    out.push({array:[...a],lo,hi,pivot:hi,desc:`<b>Partition</b> arr[${lo}..${hi}], pivot=arr[${hi}]=${pivot}`,
      comps,swaps,depth,phase:'pivot',sortedSet:new Set(finalSorted)});
    let i=lo-1;
    for(let j=lo;j<hi;j++){
      comps++;
      out.push({array:[...a],lo,hi,pivot:hi,j,i,desc:`Compare arr[${j}]=${a[j]} with pivot ${pivot}`,
        comps,swaps,depth,phase:'compare',sortedSet:new Set(finalSorted)});
      if(a[j]<=pivot){
        i++;
        if(i!==j){ [a[i],a[j]]=[a[j],a[i]]; swaps++; }
        out.push({array:[...a],lo,hi,pivot:hi,j,i,desc:`<span class="highlight">arr[${j}] ≤ pivot</span>; swap to position ${i}`,
          comps,swaps,depth,phase:'swap',sortedSet:new Set(finalSorted)});
      }
    }
    [a[i+1],a[hi]]=[a[hi],a[i+1]]; swaps++;
    finalSorted.add(i+1);
    out.push({array:[...a],lo,hi,pivot:i+1,desc:`Place pivot at final position ${i+1}`,
      comps,swaps,depth,phase:'placed',sortedSet:new Set(finalSorted)});
    sort(lo,i,depth+1);
    sort(i+2,hi,depth+1);
  }
  sort(0,a.length-1,0);
  for(let k=0;k<a.length;k++) finalSorted.add(k);
  out.push({array:[...a],lo:0,hi:a.length-1,desc:`✓ <b>Sorted</b>: [${a.join(',')}]`,
    comps,swaps,depth:maxDepth,phase:'done',sortedSet:finalSorted});
  return out;
}

function render(s){
  const c=document.getElementById('canvas');
  c.innerHTML=s.array.map((v,i)=>{
    let cls='';
    if(s.phase==='done'||s.sortedSet?.has(i)) cls='sorted';
    if(i===s.pivot&&s.phase!=='done') cls='pivot';
    if(s.phase==='compare'&&i===s.j) cls='compare';
    if(s.phase==='swap'&&(i===s.i||i===s.j)) cls='swap';
    if(s.phase==='compare'&&i<=s.i&&i>=s.lo) cls='less';
    if(s.phase==='compare'&&i>s.i&&i<s.j) cls='greater';
    return `<div class="cell ${cls}">${v}<span class="idx">${i}</span></div>`;
  }).join('');
  document.getElementById('curStep').textContent=idx+1;
  document.getElementById('depth').textContent=s.depth;
  document.getElementById('comps').textContent=s.comps;
  document.getElementById('swaps').textContent=s.swaps;
  document.getElementById('info').innerHTML=s.desc;
}
function delay(){return 1100-parseInt(document.getElementById('speedSlider').value)*100}
function start(){
  if(steps.length===0){steps=genSteps(array);document.getElementById('totSteps').textContent=steps.length}
  running=true;
  document.getElementById('startBtn').disabled=true;
  document.getElementById('pauseBtn').disabled=false;
  tick();
}
function tick(){
  if(!running||idx>=steps.length){pause();return}
  render(steps[idx]); idx++; timer=setTimeout(tick,delay());
}
function stepFwd(){
  if(steps.length===0){steps=genSteps(array);document.getElementById('totSteps').textContent=steps.length}
  if(idx<steps.length){render(steps[idx]); idx++}
}
function pause(){
  running=false; clearTimeout(timer);
  document.getElementById('startBtn').disabled=false;
  document.getElementById('pauseBtn').disabled=true;
}
function reset(){
  pause(); steps=[]; idx=0;
  ['curStep','totSteps','depth','comps','swaps'].forEach(id=>document.getElementById(id).textContent='0');
  document.getElementById('info').innerHTML='Press <span class="highlight">Start</span> to run.';
  renderInit();
}
function loadInput(){
  const raw=document.getElementById('customInput').value;
  const nums=raw.split(/[, ]+/).map(s=>parseInt(s.trim())).filter(n=>!isNaN(n));
  if(nums.length>0){array=nums;reset()}
}
function genRandom(){
  const size=7+Math.floor(Math.random()*4);
  array=Array.from({length:size},()=>Math.floor(Math.random()*30)+1);
  document.getElementById('customInput').value=array.join(', ');
  reset();
}
function renderInit(){
  document.getElementById('canvas').innerHTML=array.map((v,i)=>
    `<div class="cell">${v}<span class="idx">${i}</span></div>`).join('');
}
document.getElementById('customInput').value=array.join(', ');
renderInit();
</script>
</body></html>
