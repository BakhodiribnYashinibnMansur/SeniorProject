site_name: Senior Project
site_description: A field guide for senior software engineering — Roadmaps, Leetcode, System Design
site_author: Bakhodir Yashin Mansur
site_url: https://senior-stack.uz/

copyright: >
  // all documentation generated with
  <a href="https://claude.com/claude-code" target="_blank" rel="noopener">claude</a>
  &nbsp;·&nbsp; © 2026 senior-project
  &nbsp;·&nbsp; <a href="#__consent">Change cookie settings</a>

repo_url: https://github.com/BakhodiribnYashinibnMansur/SeniorProject
repo_name: BakhodiribnYashinibnMansur/SeniorProject
edit_uri: edit/main/

docs_dir: _docs
site_dir: _site

exclude_docs: |
  TEMPLATE.md
  **/TEMPLATE.md
  .pages
  **/.pages
  Roadmap/**/index.md
  System Design/**/index.md

theme:
  name: material
  custom_dir: overrides
  language: en
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.prefetch
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    scheme: slate
    primary: custom
    accent: custom
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    status:
      coming-soon: material/clock-outline
      new: material/alert-decagram
      deprecated: material/trash-can

hooks:
  - hooks/sibling_nav.py

plugins:
  - search
  - awesome-pages:
      strict: false
      order: asc
      sort_type: natural
      order_by: filename

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      toc_depth: 3

extra:
  status:
    coming-soon: Coming soon — not published yet
    new: Recently added
    deprecated: Deprecated
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/BakhodiribnYashinibnMansur
  analytics:
    provider: google
    property: G-9M5F0VDHK4
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback! Help us improve by
            <a href="https://github.com/BakhodiribnYashinibnMansur/SeniorProject/issues/new/?title=[Feedback]+{title}+-+{url}" target="_blank" rel="noopener">opening an issue</a>.
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences,
      as well as to measure the effectiveness of our documentation.
      With your consent, you're helping us make our content better.
    actions:
      - accept
      - reject
      - manage

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/extra.js
