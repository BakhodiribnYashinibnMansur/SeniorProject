site_name: Senior Stack
site_description: A field guide for senior software engineering — 50+ roadmaps, 100 annotated Leetcode solutions, and system design patterns curated by Bakhodir Yashin Mansur.
site_author: Bakhodir Yashin Mansur
site_url: https://senior-stack.uz/

copyright: >
  // all documentation generated with
  <a href="https://claude.com/claude-code" target="_blank" rel="noopener">claude</a>
  &nbsp;·&nbsp; © 2026 senior-project
  &nbsp;·&nbsp; <a href="#__consent">Change cookie settings</a>

repo_url: https://github.com/bakhod1r/SeniorProject
repo_name: bakhod1r/SeniorProject
edit_uri: edit/main/

docs_dir: _docs
site_dir: _site

exclude_docs: |
  TEMPLATE.md
  **/TEMPLATE.md
  .pages
  **/.pages
  Roadmap/**/index.md
  System Design/**/index.md

theme:
  name: material
  custom_dir: mkdocs/theme
  language: en
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.prefetch
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  font: false
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to sepia mode
    - scheme: senior-sepia
      primary: custom
      accent: custom
      toggle:
        icon: material/book-open-page-variant
        name: Switch to dark mode
  logo: assets/images/logo.svg
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    status:
      coming-soon: material/clock-outline
      new: material/alert-decagram
      deprecated: material/trash-can

hooks:
  - mkdocs/hooks/sibling_nav.py
  - mkdocs/hooks/read_manifest.py

plugins:
  - search
  - awesome-pages:
      strict: false
      order: asc
      sort_type: natural
      order_by: filename
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      js_files:
        - assets/extra.js
        - assets/eink.js
        - assets/fontsize.js
        - assets/reading.js
      css_files:
        - assets/extra.css
        - assets/eink.css
        - assets/fontsize.css
        - assets/reading.css
        - assets/fonts/intel-one-mono.css
  - redirects:
      # Programming-Languages restructure: legacy URLs that external
      # bookmarks / search engines still point at after the move.
      # NOTE: redirects must run AFTER minify so its stubs are emitted
      # after asset post-processing — minify mutates extra_javascript
      # entries in on_pre_build, and re-runs of on_post_build break
      # if a later plugin's pre/post-build cycle is triggered.
      redirect_maps:
        'Roadmap/Programming-Languages/golang/README.md': 'Roadmap/Programming-Languages/languages/golang/README.md'
        'Roadmap/Programming-Languages/java/README.md': 'Roadmap/Programming-Languages/languages/java/README.md'
        'Roadmap/Programming-Languages/python/README.md': 'Roadmap/Programming-Languages/languages/python/README.md'
        'Roadmap/Programming-Languages/rust/README.md': 'Roadmap/Programming-Languages/languages/rust/README.md'
        'Roadmap/Programming-Languages/sql/README.md': 'Roadmap/Programming-Languages/languages/sql/README.md'
        'Roadmap/Programming-Languages/clean-code/README.md': 'Roadmap/Programming-Languages/code-craft/clean-code/README.md'
        'Roadmap/Programming-Languages/refactoring/README.md': 'Roadmap/Programming-Languages/code-craft/refactoring/README.md'
        'Roadmap/Programming-Languages/design-patterns/README.md': 'Roadmap/Programming-Languages/code-craft/design-patterns/README.md'
        'Roadmap/Programming-Languages/testing/README.md': 'Roadmap/Programming-Languages/quality-engineering/testing/README.md'
        'Roadmap/Programming-Languages/performance/README.md': 'Roadmap/Programming-Languages/quality-engineering/performance/README.md'
        'Roadmap/Programming-Languages/concurrency/README.md': 'Roadmap/Programming-Languages/language-internals/concurrency/README.md'

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      toc_depth: 3

extra:
  status:
    coming-soon: Coming soon — not published yet
    new: Recently added
    deprecated: Deprecated
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bakhod1r
  analytics:
    provider: google
    property: G-9M5F0VDHK4
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback! Help us improve by
            <a href="https://github.com/bakhod1r/SeniorProject/issues/new/?title=[Feedback]+{title}+-+{url}" target="_blank" rel="noopener">opening an issue</a>.
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences,
      as well as to measure the effectiveness of our documentation.
      With your consent, you're helping us make our content better.
    actions:
      - accept
      - reject
      - manage

extra_css:
  - assets/fonts/intel-one-mono.css
  - assets/extra.css
  - assets/eink.css
  - assets/fontsize.css
  - assets/reading.css

extra_javascript:
  - assets/extra.js
  - assets/eink.js
  - assets/fontsize.js
  - assets/reading.js
